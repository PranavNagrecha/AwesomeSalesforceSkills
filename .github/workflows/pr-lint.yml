name: pr-lint

# Lightweight PR lint. Intentionally faster and narrower than validate.yml —
# this is the "first impression" contributors see when opening a PR. The
# heavier skill validation runs in validate.yml.
#
# Today: frontmatter schema round-trip + export manifest existence check.
# Wave 2 will flesh out the manifest check with real determinism assertions.

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  frontmatter-schema:
    name: frontmatter schema round-trip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: install deps
        run: python3 -m pip install -r requirements.txt

      - name: round-trip every AGENT.md frontmatter
        working-directory: mcp/sfskills-mcp
        run: python3 -m unittest tests.test_agent_frontmatter -v

  export-manifest-check:
    name: export manifest parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: install deps
        run: python3 -m pip install -r requirements.txt

      # lexical.sqlite is gitignored; rebuild before --check so the
      # drift detector doesn't flag it stale. Cheap (~2s).
      - name: build local retrieval index
        run: python3 scripts/build_index.py

      # Wave 2: rebuild every export target in a scratch dir, hash, and
      # diff against the committed registry/export_manifest.json. Exits
      # non-zero on any drift — the PR must update the manifest in the
      # same commit. Runs in ~20-30 s for 684 skills * 6 targets.
      #
      # Wave 6: this exit-non-zero-on-drift contract is the enforcement
      # mechanism for docs/multi-ai-parity.md. Do not remove without
      # updating that doc + tests/test_export_parity.py.
      - name: export_skills.py --check
        run: python3 scripts/export_skills.py --check

      - name: export parity unittests
        working-directory: mcp/sfskills-mcp
        run: python3 -m unittest tests.test_export_parity -v
