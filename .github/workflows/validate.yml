name: validate

# Wave-1 CI: matrix-shards validate_repo.py 4-way so 686+ skills validate in
# ~40 seconds wall-clock instead of 16+ minutes sequential. Runs on every PR
# targeting main and on every push to main. See docs/agents.md for the shard
# strategy (stable hash mod M, composable with --domain and --changed-only).

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  # -----------------------------------------------------------------------
  # Skill validation — fan out 4-way. Each shard validates ~1/4 of the repo
  # (hash-based partitioning is stable, so the same skill lands in the same
  # shard every run).
  # -----------------------------------------------------------------------
  validate-skills:
    name: skills (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: install deps
        run: python3 -m pip install -r requirements.txt

      # lexical.sqlite is gitignored (> 50 MB, past GitHub's file limit).
      # Every CI run rebuilds it from the committed chunks. This also primes
      # the drift-check state machine so the shard validation stays green.
      - name: build local retrieval index
        run: python3 scripts/build_index.py

      # --skip-fixture-retrieval is scoped to WAVE 1.1 only.
      # The retrieval-quality gate is re-enabled in Wave 6 once Wave 4 has
      # deepened the weak Flow/Agentforce skills (today ~40 shallow skills
      # return their expected skill outside top-3 because the body doesn't
      # carry enough distinctive tokens). Coverage check, duplicate check,
      # script --help check, frontmatter/structure, and drift check all still
      # run on every shard. See docs/multi-ai-parity.md (Wave 6) for the
      # re-enable criteria.
      - name: validate shard ${{ matrix.shard }}
        run: python3 scripts/validate_repo.py --skills-only --shard ${{ matrix.shard }}/4 --skip-fixture-retrieval

  # -----------------------------------------------------------------------
  # Agent validation — 72 agents validate in ~1 second; not worth sharding.
  # Wave 6: matrixed on ubuntu + macos so cross-OS hash drift in the
  # frontmatter round-trip or export parity tests surfaces here before it
  # poisons the manifest baseline downstream.
  # -----------------------------------------------------------------------
  validate-agents:
    name: agents (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: install deps
        run: python3 -m pip install -r requirements.txt

      - name: validate agents
        run: python3 scripts/validate_repo.py --agents

      - name: frontmatter round-trip test
        working-directory: mcp/sfskills-mcp
        run: python3 -m unittest tests.test_agent_frontmatter -v

      # Wave-2 probe input-validation tests. Runs without the mcp package
      # (TestProbeInputValidation) + with it (TestMCPServerRegistration,
      # skipped if mcp not installed — install -e is done separately for
      # the registration test).
      - name: probe + mcp tool tests
        working-directory: mcp/sfskills-mcp
        run: |
          python3 -m pip install -e . --quiet
          python3 -m unittest tests.test_tools -v

  # -----------------------------------------------------------------------
  # Export parity matrix — Wave 6. Runs the deterministic-export tests and
  # the manifest check on both ubuntu-latest and macos-latest to catch any
  # path-handling regression in stable_hash_for_files (the Wave 1.1 hotfix
  # that made hashes cross-OS stable). If this job diverges between OSes,
  # the multi-AI parity contract is broken and the PR must not merge.
  # -----------------------------------------------------------------------
  export-parity-matrix:
    name: export parity (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: install deps
        run: python3 -m pip install -r requirements.txt

      # Must run before --check so the lexical.sqlite drift check is clean.
      - name: build local retrieval index
        run: python3 scripts/build_index.py

      - name: export_skills.py --check (cross-OS determinism)
        run: python3 scripts/export_skills.py --check

      - name: export parity unittests
        working-directory: mcp/sfskills-mcp
        run: python3 -m unittest tests.test_export_parity -v

  # -----------------------------------------------------------------------
  # Bench — verifies the sharded orchestration hasn't regressed past the
  # 30-second threshold on 500 synthetic skills. Runs on PRs that touch
  # scripts/validate_repo.py or pipelines/ (cheap gate; full bench takes
  # <15 seconds).
  # -----------------------------------------------------------------------
  bench-orchestration:
    name: bench (500 synthetic skills)
    runs-on: ubuntu-latest
    # Only run on PRs that actually touch the validator or its workers.
    if: |
      github.event_name == 'push' ||
      contains(toJson(github.event.pull_request.labels), 'validator') ||
      contains(github.event.pull_request.title, 'validate')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: install deps
        run: python3 -m pip install -r requirements.txt

      - name: bench 500 skills under 30s
        run: python3 scripts/validate_repo_bench.py --count 500 --threshold 30
