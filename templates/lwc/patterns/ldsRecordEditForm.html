<!--
    ldsRecordEditForm — canonical LDS edit form template.

    Use for: full record edit experiences where LDS field security + validation is
    sufficient and you do NOT need custom business logic on save.

    Do NOT use when:
      - You need to validate / transform before save → use imperative Apex instead.
      - You need to write to multiple records atomically → use @AuraEnabled.
      - You need custom field rendering (charts, ML score) → use lightning-input-field
        alongside custom components in a plain <template>.
-->
<template>
    <lightning-record-edit-form
        record-id={recordId}
        object-api-name="Account"
        onsuccess={handleSuccess}
        onerror={handleError}>

        <lightning-messages></lightning-messages>

        <lightning-input-field field-name="Name"></lightning-input-field>
        <lightning-input-field field-name="Industry"></lightning-input-field>
        <lightning-input-field field-name="AnnualRevenue"></lightning-input-field>

        <div class="slds-m-top_medium">
            <lightning-button variant="brand" type="submit" name="save" label="Save"></lightning-button>
        </div>
    </lightning-record-edit-form>
</template>
