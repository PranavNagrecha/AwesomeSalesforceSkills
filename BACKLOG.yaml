  summary: "Manufacturing Cloud: account-based forecasting, rebate management, sales agreements, partner performance. NOT for standard forecasting."
  notes: "Researched 2026-04-16. Sources: [Employ Sales Agreement and Account-Based Forecasts (sf.c360guide_mfg_scenario_sales_agreements_forecasts.htm); Configure Account Forecasts (sf.af_admin_settings_concept.htm); Advanced Account Forecasting Setup (ind.aaf_admin_customize_task.htm); Manufacturing Cloud Admin Essentials — Trailhead; Rebate Management Essentials — Trailhead; Set Up Rebate Management (xcloud.admin_rebates_set_up_rebate_management.htm)]. Key: Manufacturing Cloud is a separately licensed product (~$250/user/month, Enterprise/Unlimited) layered on Sales Cloud; key objects: Sales Agreement (run-rate committed business with period-level planned vs. actual quantity/revenue on SalesAgreementProductSchedule), Account Forecast (merges opportunities, orders, sales agreements, historical order data), and Run Rate metrics. Admin setup: enable Sales Agreements in Setup, select actuals-calculation mode (direct orders, orders-through-contracts, or manual API upload), configure Advanced Account Forecasting via Data Processing Engine (DPE). Standard Salesforce Collaborative Forecasting is a DIFFERENT feature with NO overlap with these objects. Rebate Management requires Manufacturing Cloud enabled + minimum 10 Manufacturing Cloud licenses; is under Channel Revenue Management umbrella with separate pricing — treat rebate-management-setup as a related-but-separate skill. Gaps: Experience Cloud partner performance portal setup; Account Manager Targets configuration; DPE job configuration details for Advanced Account Forecasting."
