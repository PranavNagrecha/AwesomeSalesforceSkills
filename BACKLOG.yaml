- id: "data-cloud-vs-analytics-decision"
  status: "RESEARCHED"
  skill: "data-cloud-vs-analytics-decision"
  summary: "Data Cloud vs CRM Analytics: when to use each, complementary patterns, data flow design, overlapping capabilities. NOT for implementation."
  notes: "Researched 2026-04-14. Sources: [Data 360 Architecture (architect.salesforce.com/docs/architect/fundamentals/guide/data-360-architecture); Data 360 Integration Patterns (architect.salesforce.com/docs/architect/fundamentals/guide/data360_integration_patterns_and_practices); Unlock CRM Analytics Insights on Data Cloud (sf.bi_direct_data_for_cdp.htm)]. Key: Data Cloud (Data 360) is the foundational unification and identity resolution layer — it ingests, harmonizes, and profiles cross-source data using a lakehouse + real-time NVMe architecture, with identity resolution running as frequently as every 15 minutes; CRM Analytics is an analytics/visualization consumer that connects to Data Cloud via the native Direct Data connector, querying Data Model Objects (DMOs) rather than raw Salesforce objects, making them complementary rather than competing platforms. The primary decision dimension is which analytics layer to use ON TOP of Data Cloud — CRM Analytics, Tableau (JDBC/Direct Query), or direct API access (Data Graph API) — not whether to use Data Cloud OR CRM Analytics. Hard limits: Data Cloud batch ingestion caps at 100M rows or 50 GB per object; zero-copy federation available to Snowflake/Databricks/BigQuery/Redshift. No overlap with existing crm-analytics-vs-tableau-decision skill (that skill covers CRM Analytics vs Tableau only). Gaps: help.salesforce.com Analyze Data from Data 360 page (c360_a_business_intelligence_analytics.htm) returned 403 — fetch during build; confirm whether Data Cloud license is required to use Direct Data connector from CRM Analytics. LLM anti-pattern: conflating Data Cloud as an analytics tool with CRM Analytics — Data Cloud produces no dashboards; also watch for Tableau CRM (deprecated name for CRM Analytics) vs Tableau name confusion."
  source_line: 1421
  history: []
- id: "slack-workflow-builder"
  status: "RESEARCHED"
  skill: "slack-workflow-builder"
  summary: "Slack Workflow Builder with Salesforce: triggers, steps, data actions, automated notifications, approval flows. NOT for Salesforce Flow."
  notes: "Researched 2026-04-13. Sources: [Guide to Slack Workflow Builder (slack.com/help/articles/360035692513); Build No-Code Slack and Salesforce Automations With Flow (admin.salesforce.com/blog/2025); Slack Flow Core Actions (id=sf.flow_ref_elements_actions_slack.htm)]. Key: Slack Workflow Builder connects to Salesforce via the Salesforce connector step Run a Flow which can ONLY invoke active autolaunched Flows not record-triggered or screen Flows; record-triggered Flows can push Slack messages via Send a Slack Message action but only in asynchronous paths. Hard async limit of 250,000 calls per 24-hour period and configurable trigger record limit to prevent bulk notification floods. Gotcha: LLMs commonly confuse Slack Workflow Builder (Slack-native, invokes autolaunched Flows from Slack) with Salesforce Flow (Salesforce-native, can post to Slack as side-effect) -- separate authoring surfaces with different owners, trigger models, and failure modes; no declarative way to look up a user's Slack ID from Salesforce without a custom field, which LLMs routinely omit. Gaps: approval flow patterns within Slack Workflow Builder (buttons-based pause-and-resume); Slack Workflow Builder admin governance controls; behavior when Salesforce connector step auth user lacks field-level access."
  source_line: 1433
  history: []
- id: "loyalty-program-architecture"
  status: "RESEARCHED"
  skill: "loyalty-program-architecture"
  summary: "Loyalty Management architecture: tier design, point economy, partner integration, fraud prevention, scaling. NOT for implementation."
  notes: "Researched 2026-04-15. Sources: [Loyalty Management Solution Architecture (architect.salesforce.com/diagrams/template-gallery/loyalty-management-solution-architecture); Loyalty Management Capability Map (architect.salesforce.com/diagrams/reference-architectures/loyalty-management-capability-map); Loyalty Programs Data Model (architect.salesforce.com/diagrams/data-models/loyalty-cloud/loyalty-programs); Loyalty Management Data Model Developer Guide (developer.salesforce.com/docs/atlas.en-us.loyalty.meta/loyalty/loyalty_management_data_model.htm); LoyaltyMemberCurrency object (loyalty/sforce_api_objects_loyaltymembercurrency.htm); LoyaltyProgramPartner object (loyalty/sforce_api_objects_loyaltyprogrampartner.htm)]. Key: The canonical two-currency architecture is qualifying points (determine tier eligibility, LoyaltyMemberCurrency, API v51.0+) vs. non-qualifying points (redeemable for products/services) — conflating the two in point economy design is the single most common architecture mistake. Escrow points are the native fraud-prevention mechanism: points earned on a purchase are held in escrow until the return window closes, preventing redemption on subsequently returned items — a first-class data model concept, not a custom workaround. Partner integration uses LoyaltyProgramPartner with LoyaltyPgmPartnerCurrency junction (API v55.0+); architecture runs on three interoperable platforms (Salesforce Platform, Commerce, Marketing). Distinct from loyalty-management-setup (implementation mechanics, not yet built as a skill); this skill targets architect-level decisions (tier economy design rationale, partner integration topology, fraud strategy, scaling choices). LLM anti-pattern: conflating qualifying and non-qualifying points — they serve different functions and using non-qualifying for tier assessment breaks the tier calculation engine. Gaps: no official concurrency/throughput limits for Loyalty Business APIs or batch tier-processing jobs found in search results; developer guide deep-dive needed during build."
  source_line: 1447
  history: []
- id: "net-zero-cloud-setup"
  status: "RESEARCHED"
  skill: "net-zero-cloud-setup"
  summary: "Net Zero Cloud (Sustainability Cloud): carbon accounting, emission factors, sustainability reporting, targets. NOT for standard reporting."
  notes: "Researched 2026-04-14. Sources: [Net Zero Cloud Developer Guide v66.0 Spring '26 (netzero_cloud_dev_guide); Net Zero Cloud Data Model Overview (net-zero-cloud-overview); Configure a Net Zero Cloud Org — Trailhead (configure-a-net-zero-cloud-org); Emissions Factor Records Developer Guide (netzero_calc_emissions_factor_records); Net Zero Cloud IndustriesSettings API Reference (salesforce-industries-dev-guide)]. Key: Net Zero Cloud is a separately licensed Industry Cloud (Starter ~$48k/org/year; Growth ~$210k/org/year) requiring a dedicated permission set model — Net Zero Cloud Admin, Manager, and Auditor — plus Data Pipelines Base User and Use Data Processing Engine permission sets assigned in the correct order before any feature toggle is touched; skipping Data Pipelines setup before enabling carbon accounting features breaks automation silently. Feature enablement is granular: each capability (Carbon Accounting, Building Energy Intensity, Data Gaps, Scope 3 Hub, Target Setting, Waste, Water, Supplier Data, Carbon Credit Allocation) is a separate boolean toggle in SustainabilitySettings metadata (API v54.0+), and several features — Scope 3 Hub, Waste Management Category 5/12, Extended Organizational Boundaries — are Growth-license-only. Emission factors are versioned reference datasets (EPA, BEIS, IPCC sources preconfigured; custom fuel types supported) that must be loaded before carbon footprint auto-creation will calculate correctly; both Assign Carbon Footprint to Energy Use Records AND Auto-Create Carbon Footprints must be enabled — enabling one without the other leaves records uncalculated with no error. The data model exceeds 200 objects covering scope 1/2/3, stationary assets, vehicles, travel, procurement, waste, water, and ESG/materiality. Gaps: per-feature API version minimum table and CSRD/ESRS reporting output configuration need deeper doc review; Scope 3 Hub spend-based matching algorithm limits need confirmation. LLM anti-pattern: do not conflate Net Zero Cloud with standard Salesforce Reports — carbon footprint records are auto-generated by Data Processing Engine flows, not written directly by users or Apex."
  source_line: 1448
  history: []
- id: "sustainability-reporting"
  status: "RESEARCHED"
  skill: "sustainability-reporting"
  summary: "Sustainability reporting: ESG metrics, carbon footprint tracking, compliance reporting, disclosure frameworks. NOT for CRM Analytics."
  notes: "Researched 2026-04-15. Sources: [ESRS Standards — Net Zero Cloud Developer Guide (netzero_cloud_dev_guide/netzero_esrs_report.htm); Create ESRS Disclosures Report (help.salesforce.com/s/articleView?id=ind.netzero_manager_generate_esrs_report.htm); CSRD Guide for Companies (salesforce.com/net-zero/csrd-reporting/); Net Zero Cloud Emissions Tracking — Trailhead (net-zero-cloud-basics/track-emissions-with-net-zero-cloud); Sustainability Scorecard Developer Guide (netzero_cloud_dev_guide/netzero_calc_sustainability_scorecard.htm)]. Key: Net Zero Cloud has native report builders for CSRD, SASB, GRI, and CDP frameworks; CSRD compliance specifically requires a double materiality assessment (impact on business + business impact on society) as a discrete prerequisite step before report generation — skipping it produces non-compliant CSRD output even if the report builder runs. ESRS reports are authored via the MSESRSMainDataraptor Data Mapper in Microsoft Word/OmniScript format; emissions data tracked across three Scope categories using typed source objects (stationary assets, vehicle assets, Scope 3 procurement items) with Energy Use Records as unit of measure input. Distinct from net-zero-cloud-setup (feature configuration and emissions source setup — not yet built); this skill targets the reporting/disclosure output layer (which frameworks to use, double materiality, what stakeholders receive, compliance readiness). LLM anti-pattern: confusing Net Zero Cloud's built-in ESRS/CSRD Report Builder (outputs Word/OmniScript disclosures for regulators) with CRM Analytics dashboards — they are entirely separate surfaces. Gaps: GRI and SASB report builder coverage was thin in official sources; SASB sector-specific applicability and CDP submission workflow may need supplemental Trailhead/blog research during build."
  source_line: 1449
  history: []
- id: "automotive-cloud-setup"
  status: "RESEARCHED"
  skill: "automotive-cloud-setup"
  summary: "Automotive Cloud: vehicle lifecycle, dealer management, lead distribution, inventory management, test drives. NOT for standard Sales Cloud."
  notes: "Researched 2026-04-14. Sources: [Automotive Cloud Developer Guide v66.0 Spring '26 (developer.salesforce.com/docs/atlas.en-us.automotive_cloud); Automotive Cloud Standard Objects (help.salesforce.com — ind.auto_cloud.htm); Set Up Vehicle Inventory Search (ind.auto_search_configure_parent.htm); Automotive Cloud Integrations API — Vehicle Inventory Resource Mapping (industries/automotive/guide/vehicle-inventory-resource-mapping.html)]. Key: Automotive Cloud is available only in Enterprise, Unlimited, and Developer Editions and requires an Industries Automotive permission set license per user — without it, core objects (Vehicle, VehicleDefinition, LeadLineItem, LeadPreferredSeller, DealerVehDefSearchableField, Fleet, Appraisal, WarrantyTerm) are inaccessible even on eligible orgs. The data model spans 100+ domain-specific objects covering vehicle lifecycle, dealer group and OEM management, lead distribution via LeadPreferredSeller, inventory search via VehicleSearchableField, test drive scheduling, financial accounts, appraisals, claims, and telematics — all Lightning Experience only. A hard boundary exists with Manufacturing Cloud: sales agreements, advanced account forecasting, and program-based business are NOT in Automotive Cloud. MuleSoft Direct integration assets are provided for vehicle inventory BOD flows and require separate MuleSoft licensing; Name is the only mandatory field across most vehicle inventory resource mappings. Gaps: permission set license details, test drive scheduler config, vehicle inventory search setup steps return 403 from help.salesforce.com — needs Salesforce docs browser session during build; pricing tiers and Automotive Cloud Data Kit basic settings also need direct Salesforce Help access."
