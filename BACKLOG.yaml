- id: "lwc-css-and-styling"
  status: "RESEARCHED"
  skill: "lwc-css-and-styling"
  summary: "LWC CSS: :host, ::slotted, CSS custom properties, SLDS utility classes, responsive design, dynamic classes, styling limitations in Locker. NOT for SLDS framework."
  notes: "Researched 2026-04-18. Sources: [LWC CSS Guide (developer.salesforce.com/docs/platform/lwc/guide/create-components-css.html); LWC Component Slots Guide (developer.salesforce.com/docs/platform/lwc/guide/create-components-slots.html)]. Key: Scoped shadow DOM -- cascaded styles do NOT cross shadow boundaries but inherited CSS properties (color, font) do; CSS custom properties explicitly traverse shadow boundaries and are the canonical theming primitive. :host styles the root element; :host(selector) applies when host carries a matching class/attribute. :host-context(), ::part, and ID selectors are NOT supported in LWC. ::slotted selects top-level slotted content only. Dynamic class binding uses a JavaScript getter returning a computed class string. SLDS utility classes (slds-*) are global and not scoped. Under LWS, document.querySelector outside component shadow and window global mutation are blocked; element.style.setProperty is permitted. LLM anti-pattern: writing ::part() selectors (not supported); using descendant CSS selectors expecting them to cross shadow boundaries. Gaps: --slds-c-* vs --dxp-* styling hooks; @layer CSS support status; LWS impact on constructable stylesheets."
  source_line: 1623
  history: []
- id: "classic-to-lightning-migration"
  status: "RESEARCHED"
  skill: "classic-to-lightning-migration"
  summary: "Lightning Experience migration: readiness check, Visualforce gaps, JavaScript button alternatives, Classic-only features, hybrid rollout strategy. NOT for LWC development."
  notes: "Researched 2026-04-18. Sources: [How to Transition to Lightning Experience (help.salesforce.com sf.lex_welcome_to_lex.htm); Readiness Check (help.salesforce.com sf.lex_readiness_check.htm); Move Actions and Buttons to Lightning Experience (help.salesforce.com sf.lcc_actions_overview.htm); Prepare Visualforce Pages for Lightning Experience (help.salesforce.com sf.lcc_visualforce_overview.htm)]. Key: JavaScript buttons are NOT supported in Lightning Experience -- must be replaced with Quick Actions (Flow-based), LWC screen flows, or LWC; this is the most common Classic-to-Lightning blocker for button-heavy orgs. The Lightning Experience Readiness Check (Setup > Lightning Experience Migration Assistant) is the official starting point -- generates a report covering Visualforce pages, JavaScript buttons, Classic-only features, and user readiness. The Visualforce Report flags sforce.one library usage, iframe patterns, and direct record-ID URL links as incompatibility patterns. Local corpus has admin/app-and-tab-configuration covering app-level migration but no dedicated skill for the full migration process. LLM anti-pattern: suggesting just open Visualforce pages in Lightning Experience without noting that pages using sforce.one.navigateToSObject() or inline JavaScript will silently fail in the LEX Visualforce frame container. Gaps: full list of Classic-only unsupported LEX features; hybrid rollout via permission assignments; Switch to Classic toggle management; Aura component inventory as migration scope."
