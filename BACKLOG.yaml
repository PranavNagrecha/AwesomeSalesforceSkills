  notes: "Researched 2026-04-16. Sources: [Maps Permission Set Licenses (id=000380787); Give Users Access to Salesforce Maps (sales.salesforce_maps_setup_permissions_sets_assign.htm); Implementing Salesforce Maps Advanced Routing (sf.salesforce_maps_adv_implementation.htm); Configure Territory Planning (id=000389064); Best Practices for Marker Layers (id=000395535)]. Key: Salesforce Maps requires a separate Maps Permission Set License assigned before matching Permission Set — not included in any core Salesforce edition (starting ~$75/user/month). Core features: Marker Layers (record geo-pins from address fields), Shape Layers (drawn boundary polygons for proximity/territory aggregation), Live Tracking (real-time location, geo-fencing, auto-logged visits), Route Optimization and Scheduling (multi-stop routes), Territory Planning (GIS-based territory design with rep skills/seniority), and proximity/drive-time analysis (Travel Time boundaries with traffic). Targets field sales reps (pipeline visualization + visit route optimization) — NOT Field Service Lightning which handles work orders, case-severity dispatch, inventory, and technician scheduling (completely different personas and scheduling engines). Gaps: per-feature permission set breakdown (Maps Live vs. Maps Territory Planning vs. core Maps); geocoding credit limits; exact Spring '25 Territory Planning changes."
