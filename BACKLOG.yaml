  notes: "Researched 2026-04-14. Sources: [Salesforce Backup and Restore product documentation (help.salesforce.com/s/articleView?id=sf.backup_restore_overview.htm); Salesforce Well-Architected Framework Overview (architect.salesforce.com/docs/architect/well-architected/guide/overview.html)]. Key: Native Salesforce Backup and Restore is a separately purchased add-on (not included in any edition by default) that provides daily full-org snapshots with record-level selective restore by object, time range, and relationship — maximum native RPO is 24 hours; the native service does NOT cover Big Objects (append-only, no restore path via any backup tool), metadata (must use Git/source control), or file/attachment content (ContentDocument/Attachment coverage requires third-party tools such as Own Company, Veeam Backup for Salesforce, or Odaseva, which also offer sub-daily scheduling, cross-org restore, and compliance-grade audit logging for GDPR/HIPAA). Overlap boundary with existing ha-dr-architecture skill (which covers backup strategy selection at the architecture level) — this skill owns the implementation mechanics, tooling configuration, and recovery procedures, not RTO/RPO design decisions. Gaps: help.salesforce.com returns 403 for all Backup and Restore article URLs — exact retention period duration (commonly cited as 90 days but unconfirmed from primary source), specific object exclusion list, and Odaseva/Own Company feature comparisons require direct doc access during build. LLM anti-pattern: conflating native Data Export (weekly/daily CSV) with a real backup strategy — CSV export cannot perform relational record-level restore, skips files, and re-import triggers automation incorrectly."
