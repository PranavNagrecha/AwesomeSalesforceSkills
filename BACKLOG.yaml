- id: "content-document-management"
  status: "RESEARCHED"
  skill: "content-document-management"
  summary: "ContentVersion, ContentDocument, ContentDocumentLink: file creation, sharing, versioning, libraries, content delivery, rendition, file limits. NOT for file upload UI (use lwc-file-upload-patterns)."
  notes: "Researched 2026-04-18. Sources: [ContentVersion Object Reference (object_reference/sforce_api_objects_contentversion); ContentDocument Object Reference (object_reference/sforce_api_objects_contentdocument); ContentDocumentLink Object Reference (object_reference/sforce_api_objects_contentdocumentlink); ContentDistribution Object Reference (object_reference/sforce_api_objects_contentdistribution); Salesforce Files Size Limits (help.salesforce.com collab_files_size_limits)]. Key: Files created by inserting ContentVersion (requires VersionData and PathOnClient) -- Salesforce auto-creates ContentDocument; direct ContentDocument INSERT via DML is NOT allowed. Use FirstPublishLocationId on first ContentVersion insert to set owning record or library. ContentDocumentLink queries MUST filter by ContentDocumentId or LinkedEntityId -- unfiltered queries throw an exception. File size limit: 2 GB. Org hard limit: 30,000,000 ContentDocument records. Daily ContentVersion publish limit: 200,000 (Enterprise/Unlimited) or 2,500 (Developer). Orphaned ContentDocuments are NOT cascade-deleted. LLM anti-pattern: attempting INSERT on ContentDocument directly (throws DML error); omitting ContentDocumentLink creation after ContentVersion insert -- leaves file inaccessible from any record. Gaps: ContentVersion trigger addError() restriction; rendition FileType enumeration; ContentWorkspace membership management."
  source_line: 1644
