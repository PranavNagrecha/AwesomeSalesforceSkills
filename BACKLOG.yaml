- id: "flow-large-data-volume-patterns"
  status: "RESEARCHED"
  skill: "flow-large-data-volume-patterns"
  summary: "Flow patterns for large data volumes: collection variable limits, loop optimization, Get Records performance, batch-like patterns, async invocable. NOT for Batch Apex."
  notes: "Researched 2026-04-16. Sources: [General Flow Limits (sf.flow_considerations_limit.htm); Flow Considerations (platform.flow_considerations.htm); Spring '25 release note: Enhance Flow Performance Controlling Number of Records Retrieved (release=254)]. Key: Hard SOQL governor limit for Flow is 50,000 rows per transaction — unbounded Get Records throws 'Too many query rows: 50001' in production while sandbox tests with small data pass. Spring '25 added 'All records, up to a specified limit' option on Get Records element to cap retrieval safely. Classic loop+DML anti-pattern consumes shared transaction budget — correct design: query outside loop into collection, accumulate mutations in Assignment inside loop, commit single Update Records after loop. DML cap: 150 statements and 10,000 rows modified; CPU: 10 seconds; all shared across automation in one transaction. For workloads exceeding safe Flow scope, use @InvocableMethod wrapping Queueable/Batch Apex or use record-triggered flow's async path. Gaps: Spring '25 cap behavior when underlying SOQL exceeds 50K; async path budget vs Queueable; whether 2,000-record community cap is platform-enforced or recommended only."
